<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>動画→音声変換（MP3 / WAV / AAC）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      line-height: 1.6;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }
    .row {
      margin-bottom: 15px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    progress {
      width: 100%;
      height: 20px;
    }
    #downloadArea a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 15px;
      background: #0078ff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <h1>MP4 / MOV → MP3 / WAV / AAC 変換</h1>

  <div class="row">
    <input id="fileInput" type="file" accept=".mp4,.mov,video/*" />
  </div>

  <div class="row">
    <label>出力フォーマット: </label>
    <select id="formatSelect">
      <option value="mp3">MP3</option>
      <option value="wav">WAV</option>
      <option value="aac">AAC</option>
    </select>
  </div>

  <div class="row">
    <button id="convertBtn">変換する</button>
  </div>

  <div class="row">
    <progress id="progress" value="0" max="100"></progress>
    <div id="status"></div>
  </div>

  <div class="row" id="downloadArea"></div>

  <!-- ★ GitHub Pages で動くように相対パスで app.js を読み込む -->
  <script type="module" src="./app.js"></script>
</body>
</html>
